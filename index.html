<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cidade Nova Store</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
}

header{
background:#0d0d0d;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid rgb(255,138,6);
position:sticky;
top:0;
z-index:999;
}

.logo h1{
color:rgb(255,138,6);
}

.nav-right{
display:flex;
gap:15px;
align-items:center;
}

.btn{
background:rgb(255,138,6);
color:black;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
opacity:0.8;
}

</html>
